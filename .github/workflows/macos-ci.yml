# macOS CI — runs on GitHub's free macOS runners (free + unlimited because this
# repo is PUBLIC).
#
# The `core` job builds + unit-tests the shared C++ engine with APPLE's clang on
# every push/PR. That is the iOS production compiler family, so a green run here
# proves the core cross-compiles for the Apple side long before the Xcode app
# exists — no Mac hardware needed locally.
#
# The `ios-app` job builds the iOS app for the SIMULATOR (no code-signing, so no
# Apple Developer cert): CMake generates the Xcode project on the runner, then
# xcodebuild compiles it. This is how the iPhone half is verified with no local Mac.
name: macOS CI

on:
  push:
  pull_request:

jobs:
  core:
    name: Core (Apple clang)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # cmake is preinstalled on GitHub macOS runners; ninja is not.
      - name: Install Ninja
        run: brew install ninja

      # No -DCMAKE_CXX_COMPILER: use the runner's default Apple clang on purpose.
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  ios-app:
    name: iOS app (simulator build)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # MoltenVK (Vulkan-on-Metal) — the one sanctioned third-party dep. Fetch the
      # prebuilt static xcframework + Vulkan headers; cache by version so the 165 MB
      # download happens once and is shared across jobs/runs.
      - name: Cache MoltenVK
        id: mvk
        uses: actions/cache@v4
        with:
          path: mvk
          key: moltenvk-1.4.1-ios
      - name: Fetch MoltenVK (v1.4.1)
        if: steps.mvk.outputs.cache-hit != 'true'
        run: |
          curl -fL -o /tmp/MoltenVK-all.tar \
            https://github.com/KhronosGroup/MoltenVK/releases/download/v1.4.1/MoltenVK-all.tar
          mkdir -p mvk
          tar -xf /tmp/MoltenVK-all.tar -C mvk \
            MoltenVK/MoltenVK/include \
            MoltenVK/MoltenVK/static/MoltenVK.xcframework/ios-arm64 \
            MoltenVK/MoltenVK/static/MoltenVK.xcframework/ios-arm64_x86_64-simulator

      # The iOS app is its own CMake project (like Android's), pulling in the shared
      # C++ core via add_subdirectory. CMake generates the .xcodeproj on the runner,
      # so nobody opens Xcode locally.
      - name: Configure (CMake -> Xcode project)
        run: |
          cmake -S Games/Chess/iOS -B Games/Chess/iOS/build -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphonesimulator \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DMOLTENVK_DIR="$GITHUB_WORKSPACE/mvk/MoltenVK/MoltenVK" \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO

      # Simulator build => no signing, no Apple Developer cert required.
      - name: Build for iOS Simulator
        run: |
          xcodebuild -project Games/Chess/iOS/build/OnlyChess.xcodeproj \
            -scheme OnlyChess -configuration Debug \
            -sdk iphonesimulator CODE_SIGNING_ALLOWED=NO build

  ios-ipa:
    name: iOS unsigned .ipa (for sideloading)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache MoltenVK
        id: mvk
        uses: actions/cache@v4
        with:
          path: mvk
          key: moltenvk-1.4.1-ios
      - name: Fetch MoltenVK (v1.4.1)
        if: steps.mvk.outputs.cache-hit != 'true'
        run: |
          curl -fL -o /tmp/MoltenVK-all.tar \
            https://github.com/KhronosGroup/MoltenVK/releases/download/v1.4.1/MoltenVK-all.tar
          mkdir -p mvk
          tar -xf /tmp/MoltenVK-all.tar -C mvk \
            MoltenVK/MoltenVK/include \
            MoltenVK/MoltenVK/static/MoltenVK.xcframework/ios-arm64 \
            MoltenVK/MoltenVK/static/MoltenVK.xcframework/ios-arm64_x86_64-simulator

      # A DEVICE build (arm64, iphoneos) with signing disabled. The simulator app
      # can't use real Bluetooth, so the cross-platform test needs the app on a
      # physical iPhone — which means a device build. It's unsigned; Sideloadly (on
      # the dev PC) signs it with a free Apple ID at install time.
      - name: Configure (device, unsigned)
        run: |
          cmake -S Games/Chess/iOS -B Games/Chess/iOS/build-device -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DMOLTENVK_DIR="$GITHUB_WORKSPACE/mvk/MoltenVK/MoltenVK" \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO

      - name: Build (device, unsigned)
        run: |
          xcodebuild -project Games/Chess/iOS/build-device/OnlyChess.xcodeproj \
            -scheme OnlyChess -configuration Debug \
            -sdk iphoneos -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" build

      # Wrap OnlyChess.app in the standard Payload/ layout and zip it to a .ipa.
      - name: Package unsigned .ipa
        run: |
          APP=$(find Games/Chess/iOS/build-device -name 'OnlyChess.app' -type d | head -1)
          echo "App bundle: $APP"
          rm -rf Payload && mkdir Payload && cp -R "$APP" Payload/
          zip -qry OnlyChess-unsigned.ipa Payload

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: OnlyChess-unsigned-ipa
          path: OnlyChess-unsigned.ipa
          if-no-files-found: error

  ios-ipa-rps:
    name: RPS iOS unsigned .ipa (for sideloading)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache MoltenVK
        id: mvk
        uses: actions/cache@v4
        with:
          path: mvk
          key: moltenvk-1.4.1-ios
      - name: Fetch MoltenVK (v1.4.1)
        if: steps.mvk.outputs.cache-hit != 'true'
        run: |
          curl -fL -o /tmp/MoltenVK-all.tar \
            https://github.com/KhronosGroup/MoltenVK/releases/download/v1.4.1/MoltenVK-all.tar
          mkdir -p mvk
          tar -xf /tmp/MoltenVK-all.tar -C mvk \
            MoltenVK/MoltenVK/include \
            MoltenVK/MoltenVK/static/MoltenVK.xcframework/ios-arm64 \
            MoltenVK/MoltenVK/static/MoltenVK.xcframework/ios-arm64_x86_64-simulator

      # Same shape as the chess ios-ipa job: a device (arm64, iphoneos) build with
      # signing disabled; the RTS app on a physical iPhone for the Android<->iPhone test.
      - name: Configure (device, unsigned)
        run: |
          cmake -S Games/RocksPapersScissors/iOS -B Games/RocksPapersScissors/iOS/build-device -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DMOLTENVK_DIR="$GITHUB_WORKSPACE/mvk/MoltenVK/MoltenVK" \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO

      - name: Build (device, unsigned)
        run: |
          xcodebuild -project Games/RocksPapersScissors/iOS/build-device/OnlyRps.xcodeproj \
            -scheme OnlyRps -configuration Debug \
            -sdk iphoneos -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" build

      - name: Package unsigned .ipa
        run: |
          APP=$(find Games/RocksPapersScissors/iOS/build-device -name 'OnlyRps.app' -type d | head -1)
          echo "App bundle: $APP"
          rm -rf Payload && mkdir Payload && cp -R "$APP" Payload/
          zip -qry OnlyRps-unsigned.ipa Payload

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: OnlyRps-unsigned-ipa
          path: OnlyRps-unsigned.ipa
          if-no-files-found: error
